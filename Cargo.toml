[package]
name = "speedtest-admin"
version = "0.1.0"
edition = "2021"
default-run = "speedtest-admin"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["macros"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "trace", "cors"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "mysql", "postgres", "chrono"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
askama = "0.12"
askama_axum = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bcrypt = "0.15"
uuid = { version = "1.0", features = ["v4", "serde"] }
dotenv = "0.15"
rand = "0.8"
md5 = "0.7"
urlencoding = "2.1"

[profile.release]
strip = true
lto = true
codegen-units = 1
opt-level = "z"
