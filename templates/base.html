<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Speedtest Tracker{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="/css/rust-app.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
    <script>
        // Dark mode support
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    {% block extra_styles %}{% endblock %}
</head>
<body class="h-full antialiased bg-gray-50 dark:bg-gray-950 text-gray-950 dark:text-white">
    {% block header %}
    <header class="bg-blue-600 dark:bg-blue-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-xl md:text-2xl font-bold">🐇 Speedtest Tracker</h1>
                <nav class="flex gap-2 md:gap-4">
                    <a href="/" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 dark:hover:bg-blue-600 transition">Dashboard</a>
                    <a href="/admin/speedtest" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 dark:hover:bg-blue-600 transition">Run Test</a>
                    <a href="/admin/schedules" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 dark:hover:bg-blue-600 transition">Schedules</a>
                    <a href="/admin/results" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 dark:hover:bg-blue-600 transition">Results</a>
                    <a href="/admin/profile" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 dark:hover:bg-blue-600 transition">Profile</a>
                    <a href="/admin/api-tokens" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 dark:hover:bg-blue-600 transition">API Tokens</a>
                    <a href="/logout" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 dark:hover:bg-blue-600 transition">Logout</a>
                </nav>
            </div>
        </div>
    </header>
    {% endblock %}
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
