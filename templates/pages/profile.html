{% extends "../base.html" %}

{% block title %}Profile - Speedtest Tracker{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-900 rounded-lg shadow-sm p-6 max-w-2xl">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6">Profile Settings</h2>
    
    {% if let Some(msg) = message %}
    <div class="bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-200 p-4 rounded-lg mb-6">
        {{ msg }}
    </div>
    {% endif %}
    
    <form method="post" action="/admin/profile" class="space-y-6">
        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                Name
            </label>
            <input 
                type="text" 
                id="name" 
                name="name" 
                value="{{ self.user.name }}" 
                required
                class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                       bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100
                       focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent
                       transition">
        </div>
        
        <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                Email
            </label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                value="{{ self.user.email }}" 
                required
                class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                       bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100
                       focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent
                       transition">
        </div>
        
        <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                New Password
            </label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Leave blank to keep current password"
                class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                       bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100
                       focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent
                       transition">
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                Only fill this if you want to change your password
            </p>
        </div>
        
        <button 
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 
                   text-white font-semibold px-6 py-3 rounded-lg transition">
            Update Profile
        </button>
    </form>
</div>
{% endblock %}
