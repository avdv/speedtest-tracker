<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Speedtest Tracker</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="/css/rust-app.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="h-full flex items-center justify-center antialiased">
    <div class="bg-white dark:bg-gray-900 p-12 rounded-xl shadow-md max-w-md w-full mx-4">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 text-center mb-8">🐇 Speedtest Tracker</h1>
        {% if let Some(err) = error %}
        <div class="bg-red-50 dark:bg-red-900/20 text-red-900 dark:text-red-200 p-3 rounded-lg mb-6">
            {{ err }}
        </div>
        {% endif %}
        <form method="post" action="/login" class="space-y-6">
            <div>
                <label for="email" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
                    Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                           bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100
                           focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent
                           transition">
            </div>
            <div>
                <label for="password" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
                    Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                           bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100
                           focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent
                           transition">
            </div>
            <button 
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 
                       text-white font-semibold px-6 py-3 rounded-lg transition">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
